# ─────────────────────────────────────────────────────────
# Konfiguracja ZMK – Dactyl Manuform 6x6 – LEWA POŁOWA
# ─────────────────────────────────────────────────────────

# Nazwa klawiatury widoczna w systemie operacyjnym
CONFIG_ZMK_KEYBOARD_NAME="Dactyl 6x6"

# Bluetooth – włącz wsparcie BLE
CONFIG_BT=y
CONFIG_BLE=y
CONFIG_ZMK_BLE=y

# Liczba profili BT (maksymalnie 5)
CONFIG_BT_MAX_PAIRED=5
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Podzielona klawiatura – lewa połowa jest CENTRAL
# (podłączona do USB lub inicjuje połączenie BT z hostem)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Opóźnienie debounce klawisza (ms) – zwiększ przy zgłoszeniach podwójnych naciśnięć
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Uśpienie po czasie nieaktywności – dostosuj do potrzeb (ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# USB HID – wymagane do pracy przewodowej przez lewą połowę
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID=y

# Zarządzanie energią
CONFIG_ZMK_PM_SOFT_OFF=y

# Opcjonalnie: dioda LED statusu (zakomentuj jeśli brak LED)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Logi – wyłącz w wersji produkcyjnej (oszczędność energii i flash)
CONFIG_ZMK_LOG_LEVEL_ERR=y
# Odkomentuj do debugowania:
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_LOG=y
