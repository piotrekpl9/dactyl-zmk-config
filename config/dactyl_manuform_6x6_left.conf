# ─────────────────────────────────────────────────────────
# Konfiguracja ZMK – Dactyl Manuform 6x6 – LEWA POŁOWA
# Rola: CENTRAL (podłączona do komputera, obsługuje ZMK Studio)
# ─────────────────────────────────────────────────────────

# Bluetooth
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="Dactyl MF 6x6"

# Podzielona klawiatura – lewa połowa jest CENTRAL
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Uśpienie
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Zarządzanie energią
CONFIG_ZMK_PM_SOFT_OFF=y

# ZMK Studio – konfigurowane przez build.yaml (snippet + cmake-args)
CONFIG_ZMK_STUDIO_LOCKING=n
