# ─────────────────────────────────────────────────────────
# Konfiguracja ZMK – Dactyl Manuform 6x6 – PRAWA POŁOWA
# ─────────────────────────────────────────────────────────

# Bluetooth
CONFIG_BT=y
CONFIG_BLE=y
CONFIG_ZMK_BLE=y

# Podzielona klawiatura – TYMCZASOWO jako CENTRAL (do testów bez lewej połowy)
# Gdy lewa będzie zlutowana: usuń CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Wymagane dla central – wyjście USB i BLE do hosta
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_HID=y

# Debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Uśpienie
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Zarządzanie energią
CONFIG_ZMK_PM_SOFT_OFF=y

# Logi – wyłącz w wersji produkcyjnej
CONFIG_ZMK_LOG_LEVEL_ERR=y
