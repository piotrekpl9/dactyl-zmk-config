# ─────────────────────────────────────────────────────────
# Konfiguracja ZMK – Dactyl Manuform 6x6 – PRAWA POŁOWA
# Rola: PERIPHERAL (łączy się z lewą przez BLE)
# ─────────────────────────────────────────────────────────

# Bluetooth
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_BT_DEVICE_NAME="Dactyl MF 6x6"

# Podzielona klawiatura – prawa połowa jest PERIPHERAL
# (brak CONFIG_ZMK_SPLIT_ROLE_CENTRAL)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Uśpienie
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Zarządzanie energią
CONFIG_ZMK_PM_SOFT_OFF=y

# TYMCZASOWE – wyczyść stare BLE bonds przy starcie (usuń po pierwszym udanym parowaniu)
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
